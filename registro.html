<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear Cuenta – Rectificadora Automotriz</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
  .login-box { background: white; border-radius: 16px; padding: 2.5rem 2rem; box-shadow: 0 20px 60px rgba(0,0,0,0.4); width: 100%; max-width: 460px; }
  .login-logo { text-align: center; margin-bottom: 1.5rem; }
  .login-logo .icon { font-size: 2.4rem; }
  .login-logo h4 { font-weight: 800; color: #1a1a2e; margin: 0.5rem 0 0.2rem; }
  .login-logo p { color: #6c757d; font-size: 0.88rem; margin: 0; }
</style>
</head>
<body>

<div class="login-box">
  <div class="login-logo">
    <div class="icon">🔧</div>
    <h4>Rectificadora <span style="color:#e63946">Automotriz</span></h4>
    <p>Crea tu cuenta para agendar citas</p>
  </div>

  <form id="registroForm" novalidate>

    <div class="row g-3">
      <div class="col-sm-6">
        <label for="nombre" class="form-label">Nombre</label>
        <input type="text" class="form-control" id="nombre" placeholder="Juan" required>
        <div class="invalid-feedback">Campo obligatorio.</div>
      </div>
      <div class="col-sm-6">
        <label for="apellido" class="form-label">Apellido</label>
        <input type="text" class="form-control" id="apellido" placeholder="García" required>
        <div class="invalid-feedback">Campo obligatorio.</div>
      </div>
    </div>

    <div class="mt-3">
      <label for="correo" class="form-label">Correo electrónico</label>
      <input type="email" class="form-control" id="correo" placeholder="correo@ejemplo.com" required>
      <div class="invalid-feedback">Ingresa un correo válido.</div>
    </div>

    <div class="mt-3">
      <label for="password" class="form-label">Contraseña</label>
      <input type="password" class="form-control" id="password" placeholder="Mínimo 6 caracteres" required minlength="6">
      <div class="invalid-feedback">Mínimo 6 caracteres.</div>
    </div>

    <div id="mensaje"></div>

    <button type="submit" class="btn-rojo w-100 mt-4">
      <span class="spinner-btn" id="spinner"></span>
      Crear cuenta
    </button>

  </form>

  <hr class="my-3">
  <p class="text-center mb-0" style="font-size:0.9rem; color:#6c757d;">
    ¿Ya tienes cuenta? <a href="login.html" style="color:#e63946; font-weight:600;">Inicia sesión</a>
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="registro.js"></script>
<script src="chatbot.js"></script>
</body>
</html>
