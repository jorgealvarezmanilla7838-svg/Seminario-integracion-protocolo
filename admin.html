<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin – Rectificadora Automotriz</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="admin.html">🔧 Rectificadora <span>Automotriz</span></a>
    <div class="ms-auto d-flex align-items-center gap-3">
      <span class="badge-user">⚙️ Administrador</span>
      <button onclick="logout()" class="btn-outline-rojo" style="border-color:rgba(255,255,255,0.4); color:rgba(255,255,255,0.8);">Cerrar sesión</button>
    </div>
  </div>
</nav>

<div class="hero">
  <h1>⚙️ Panel de Administrador</h1>
  <p>Gestión de citas registradas en el sistema</p>
</div>

<div class="container">
  <div class="card-content">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
      <h5 class="fw-bold mb-0" style="color:#1a1a2e;">Todas las citas</h5>
      <span class="badge" style="background:#e63946; font-size:0.85rem; padding:0.4rem 0.9rem;" id="totalCitas">0 citas</span>
    </div>

    <div id="listaCitas"></div>
  </div>
</div>

<div class="footer">© 2026 Rectificadora Automotriz · Panel Admin</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="admin.js"></script>
<script src="chatbot.js"></script>
</body>
</html>
