<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="index.html">🔧 Rectificadora <span>Automotriz</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto ms-3 gap-1">
        <li class="nav-item"><a class="nav-link" href="index.html">🏠 Inicio</a></li>
        <li class="nav-item"><a class="nav-link active" href="ver_citas.html">📋 Mis citas</a></li>
        <li class="nav-item"><a class="nav-link" href="consultas.html">📅 Agendar</a></li>
      </ul>
      <div class="d-flex align-items-center gap-3 mt-2 mt-lg-0">
        <span class="badge-user" id="navUsuario"></span>
        <button onclick="logout()" class="btn-outline-rojo" style="border-color:rgba(255,255,255,0.4); color:rgba(255,255,255,0.8);">Cerrar sesión</button>
      </div>
    </div>
  </div>
</nav>

<div class="hero">
  <h1>📋 Mis Citas</h1>
  <p>Historial de citas registradas</p>
</div>

<div class="container">
  <div class="card-content">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
      <h5 class="fw-bold mb-0" style="color:#1a1a2e;">Tus citas registradas</h5>
      <a href="consultas.html" class="btn-rojo" style="font-size:0.9rem; padding:0.5rem 1.2rem;">+ Nueva cita</a>
    </div>

    <div id="contenidoCitas"></div>
  </div>
</div>

<div class="footer">© 2026 Rectificadora Automotriz</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="session.js"></script>
<script>
function cargarCitas() {
  const usuario = JSON.parse(localStorage.getItem("usuarioActivo"));
  const citas   = JSON.parse(localStorage.getItem("citas")) || [];
  const contenedor = document.getElementById("contenidoCitas");

  const citasUsuario = citas.filter(c => c.correo === usuario.correo);

  if (citasUsuario.length === 0) {
    contenedor.innerHTML = `
      <div class="empty-state">
        <div class="icon">📭</div>
        <p class="fw-semibold" style="color:#495057;">No tienes citas registradas.</p>
        <a href="consultas.html" class="btn-rojo mt-2">Agendar mi primera cita</a>
      </div>`;
    return;
  }

  // Tabla responsive
  let html = `
    <div class="table-responsive">
      <table class="tabla-custom">
        <thead>
          <tr>
            <th>Servicio</th>
            <th>Fecha</th>
            <th>Hora</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody>`;

  citasUsuario.forEach(c => {
    const esPasada = c.fecha < new Date().toISOString().split("T")[0];
    const estado   = esPasada
      ? `<span class="badge bg-secondary">Completada</span>`
      : `<span class="badge" style="background:#e63946;">Próxima</span>`;
    html += `<tr>
      <td><strong>${c.servicio}</strong></td>
      <td>${c.fecha}</td>
      <td>${c.hora || "—"}</td>
      <td>${estado}</td>
    </tr>`;
  });

  html += `</tbody></table></div>`;
  contenedor.innerHTML = html;
}

window.onload = cargarCitas;
</script>
<script src="chatbot.js"></script>
</body>
</html>
